<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js" defer></script></head>
<body>

<div class="start-screen">
    <h1>Tic-Tac-Toe</h1>
    <button class="start-button" data-mode="ai">Play with AI</button>
    <button class="start-button" data-mode="pvp">2 Players on One Device</button>
    <button class="start-button" data-mode="online">Play Online</button>
    <button class="settings-button">Settings</button>
</div>

<div class="game-screen hidden">
    <h1>Tic-Tac-Toe</h1>

    <p class="status">Current player: X</p>

    <div class="board">
        <button class="cell" data-index="0"></button>
        <button class="cell" data-index="1"></button>
        <button class="cell" data-index="2"></button>
        <button class="cell" data-index="3"></button>
        <button class="cell" data-index="4"></button>
        <button class="cell" data-index="5"></button>
        <button class="cell" data-index="6"></button>
        <button class="cell" data-index="7"></button>
        <button class="cell" data-index="8"></button>
    </div>
    <button class="in-game-menu-button">Main Menu</button>
</div>

<div class="game-over-screen hidden">
    <h1>Game Over</h1>
    <h2 class="result-text"></h2>
    <button class="restart">Play Again</button>
    <button class="main-menu-button">Main Menu</button>
    <button class="find-match-button hidden">Find New Match</button>
</div>

</body>
</html>
